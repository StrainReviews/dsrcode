# golangci-lint v2 configuration for CI
# Run: golangci-lint run ./...
version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
  exclusions:
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
